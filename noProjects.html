<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon — Amy Tran</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --cream: #f5f0e8;
            --black: #0a0a0a;
            --charcoal: #1a1a1a;
            --gold: #c9a96e;
            --gold-light: #e8d5b0;
            --text-muted: #888;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--black);
            color: var(--cream);
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* subtle animated grain overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 28px 60px;
            background: linear-gradient(to bottom, rgba(10,10,10,0.95), transparent);
        }

        .nav-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--cream);
            text-decoration: none;
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        .nav-logo:hover { opacity: 1; }

        .nav-home {
            color: var(--cream);
            font-size: 1.1rem;
            opacity: 0.75;
            text-decoration: none;
            transition: color 0.3s, transform 0.3s, opacity 0.3s;
        }
        .nav-home:hover { color: var(--gold); transform: translateY(-2px); opacity: 1; }
        /* nav home icon */

        .nav-home:hover { color: var(--gold); transform: translateY(-2px); opacity: 1; }

        /* nav logo */

        .nav-logo:hover { opacity: 1; }

        /* center content */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .eyebrow {
            font-size: 0.65rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--gold);
        }

        .main-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3rem, 8vw, 6.5rem);
            font-weight: 300;
            line-height: 1;
            color: var(--cream);
        }

        .main-text em {
            font-style: italic;
            color: var(--gold-light);
        }

        .sub-text {
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            max-width: 360px;
            line-height: 1.8;
        }

        /* animated gold line */
        .gold-line {
            width: 60px;
            height: 1px;
            background: var(--gold);
            opacity: 0.5;
            animation: expandLine 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
        }

        @keyframes expandLine {
            from { width: 0; opacity: 0; }
            to   { width: 60px; opacity: 0.5; }
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gold);
            text-decoration: none;
            padding: 14px 32px;
            border: 1px solid rgba(201, 169, 110, 0.4);
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .back-link::before { content: '←'; }
        .back-link:hover {
            background: var(--gold);
            color: var(--black);
            border-color: var(--gold);
            gap: 18px;
        }

        /* floating decorative numbers */
        .deco {
            position: fixed;
            font-family: 'Cormorant Garamond', serif;
            font-size: 18vw;
            font-weight: 300;
            color: rgba(201, 169, 110, 0.03);
            pointer-events: none;
            user-select: none;
            line-height: 1;
        }
        .deco-left  { left: -4vw; bottom: -4vh; }
        .deco-right { right: -4vw; top: -4vh; }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 28px;
        }

        .nav-dropdown {
            position: relative;
        }

        .nav-projects-label {
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--cream);
            opacity: 0.75;
            cursor: default;
            transition: color 0.3s, opacity 0.3s;
        }

        .nav-dropdown:hover .nav-projects-label {
            color: var(--gold);
            opacity: 1;
        }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 16px);
            right: 0;
            background: rgba(15, 15, 15, 0.97);
            border: 1px solid #2a2a2a;
            border-top: 1px solid var(--gold);
            min-width: 220px;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transform: translateY(8px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .nav-dropdown:hover .dropdown-menu {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        .dropdown-menu a {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            text-decoration: none;
            padding: 16px 24px;
            border-bottom: 1px solid #1a1a1a;
            transition: color 0.3s, padding-left 0.3s;
        }

        .dropdown-menu a:last-child { border-bottom: none; }

        .dropdown-menu a:hover {
            color: var(--gold);
            padding-left: 32px;
        }
        .nav-dropdown::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            height: 20px;
        }
        .nav-dropdown:hover .dropdown-menu {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="nav-logo">Amy Tran</a>
    <div class="nav-right">
        <a href="index.html" class="nav-home" aria-label="Home"><i class="fa-solid fa-house"></i></a>
        <div class="nav-dropdown">
            <span class="nav-projects-label">Projects</span>
            <div class="dropdown-menu">
                <a href="NewVideoGame.html">Video Game Dev</a>
                <a href="NewWebsites.html">Websites &amp; Apps</a>
                <a href="AiProjects.html">ML, AI &amp; Data Science</a>
                <a href="noProjects.html">Other Projects</a>
            </div>
        </div>
    </div>
</nav>
<!-- decorative background text -->
<span class="deco deco-left">00</span>
<span class="deco deco-right">—</span>

<div class="container">
    <p class="eyebrow">Other Projects</p>
    <div class="gold-line"></div>
    <h1 class="main-text">Coming<br><em>Soon.</em></h1>
    <p class="sub-text">No projects here yet — but something is always in the works. Check back soon.</p>
    <a href="index.html" class="back-link">Back to Portfolio</a>
</div>

</body>
</html>
